<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Internship Calculator Project</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator-container">
      <h2>JS Calculator</h2>

      <form id="calcForm">
        <div class="input-group">
          <input type="number" id="num1" placeholder="First Number" value="0" />
          <input
            type="number"
            id="num2"
            placeholder="Second Number"
            value="0"
          />
        </div>

        <hr />

        <div class="results-grid">
          <div class="result-row">
            <span class="operator">+</span>
            <span class="output-val" id="result-add">0</span>
          </div>

          <div class="result-row">
            <span class="operator">-</span>
            <span class="output-val" id="result-sub">0</span>
          </div>

          <div class="result-row">
            <span class="operator">×</span>
            <span class="output-val" id="result-mul">0</span>
          </div>

          <div class="result-row">
            <span class="operator">÷</span>
            <span class="output-val" id="result-div">0</span>
          </div>
        </div>

        <button type="button" id="clearBtn" class="clear-btn">Clear</button>
      </form>
    </div>

    <script src="script.js"></script>
  </body>
</html>
